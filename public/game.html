<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>보드게임 온라인</title>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#4a9eff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="보드게임">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="css/game.css">
  <link rel="stylesheet" href="css/games/chess.css">
  <link rel="stylesheet" href="css/games/omok.css">
  <link rel="stylesheet" href="css/games/connect4.css">
  <link rel="stylesheet" href="css/games/othello.css">
  <link rel="stylesheet" href="css/games/indianpoker.css">
  <link rel="stylesheet" href="css/games/checkers.css">
  <link rel="stylesheet" href="css/games/applegame.css">
  <link rel="stylesheet" href="css/games/battleship.css">
  <link rel="stylesheet" href="css/games/backgammon.css">
  <link rel="stylesheet" href="css/games/texasholdem.css">
  <link rel="stylesheet" href="css/games/dotsboxes.css">
  <link rel="stylesheet" href="css/games/mancala.css">
</head>
<body>

  <!-- 연결 오버레이 -->
  <div id="connecting-overlay" class="overlay">
    <div class="overlay-content">
      <div class="spinner-lg"></div>
      <p>연결 중...</p>
    </div>
  </div>

  <!-- 관전자 닉네임 입력 오버레이 -->
  <div id="spectator-join-overlay" class="overlay" style="display:none;">
    <div class="overlay-content" style="max-width:320px;padding:32px;background:#1a1f2e;border-radius:16px;border:1px solid #2a3040;">
      <div style="font-size:2rem;margin-bottom:16px;">👁</div>
      <h2 style="color:#f0c040;font-size:1.2rem;margin-bottom:8px;">관전자로 참가</h2>
      <p style="color:#8892a4;font-size:0.9rem;margin-bottom:20px;">닉네임을 입력하고 관전을 시작하세요</p>
      <input type="text" id="spectator-nickname-input"
        placeholder="닉네임 (최대 20자)"
        maxlength="20" autocomplete="off"
        style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2a3040;background:#0f1117;color:#e0e6f0;font-size:1rem;margin-bottom:12px;">
      <button id="spectator-join-submit"
        style="width:100%;padding:12px;border-radius:8px;background:#f0c040;color:#1a1a2e;font-weight:700;border:none;cursor:pointer;font-size:1rem;margin-bottom:8px;">
        관전 시작
      </button>
      <button onclick="location.href='/'"
        style="width:100%;padding:10px;border-radius:8px;background:transparent;color:#8892a4;border:1px solid #2a3040;cursor:pointer;font-size:0.9rem;">
        취소
      </button>
    </div>
  </div>

  <!-- 관전 대기 오버레이 (승인 기다리는 중) -->
  <div id="spectator-pending-overlay" class="overlay" style="display:none;">
    <div class="overlay-content">
      <div class="spinner-lg"></div>
      <p style="margin-top:16px;">방장의 승인을 기다리는 중...</p>
      <button onclick="location.href='/'"
        style="margin-top:20px;padding:10px 24px;border-radius:8px;background:transparent;color:#8892a4;border:1px solid #2a3040;cursor:pointer;">
        취소
      </button>
    </div>
  </div>

  <!-- 관전 요청 알림 (방장에게 표시) -->
  <div id="spectator-request-toast" style="display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);
    background:#1a1f2e;border:1px solid #f0c04066;border-radius:12px;padding:16px 20px;
    z-index:9998;min-width:280px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.6);">
    <p style="color:#f0c040;font-weight:600;margin-bottom:4px;">관전 요청</p>
    <p id="spectator-request-name" style="color:#c8d0de;font-size:0.9rem;margin-bottom:12px;"></p>
    <div style="display:flex;gap:8px;justify-content:center;">
      <button id="spectator-approve-btn"
        style="padding:8px 20px;border-radius:8px;background:#4caf50;color:#fff;border:none;cursor:pointer;font-weight:600;">
        승인
      </button>
      <button id="spectator-deny-btn"
        style="padding:8px 20px;border-radius:8px;background:#e05555;color:#fff;border:none;cursor:pointer;font-weight:600;">
        거부
      </button>
    </div>
  </div>

  <!-- 끊김 배너 -->
  <div id="disconnect-banner" class="banner" style="display:none;">
    <div class="spinner-sm"></div>
    <span id="disconnect-msg">상대방 연결이 끊겼습니다. 재접속 대기 중...</span>
  </div>

  <!-- 메인 레이아웃 -->
  <div id="game-layout">

    <!-- 왼쪽: 채팅 (데스크탑) / 하단 (모바일) -->
    <aside id="chat-panel">
      <div class="chat-header">
        <span>채팅</span>
        <button id="chat-close-btn" class="btn-icon-sm">✕</button>
      </div>
      <div id="chat-messages"></div>
      <div class="emote-bar">
        <button class="emote-btn" data-emote="👍">👍</button>
        <button class="emote-btn" data-emote="😂">😂</button>
        <button class="emote-btn" data-emote="😮">😮</button>
        <button class="emote-btn" data-emote="😤">😤</button>
        <button class="emote-btn" data-emote="🤝">🤝</button>
        <button class="emote-btn" data-emote="🔥">🔥</button>
        <button class="emote-btn" data-emote="💀">💀</button>
        <button class="emote-btn" data-emote="♟">♟</button>
      </div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="메시지 입력..." maxlength="200" autocomplete="off">
        <button id="chat-send-btn">전송</button>
      </div>
    </aside>

    <!-- 중앙: 게임 영역 -->
    <main id="game-center">

      <!-- 상대방 정보 -->
      <div class="player-bar" id="opponent-bar">
        <div class="player-info">
          <span class="player-color-dot" id="opponent-dot"></span>
          <span class="player-label" id="opponent-label">상대방</span>
        </div>
        <div class="timer-display" id="opponent-timer">-</div>
      </div>

      <!-- 보드 래퍼 (체스 / 오목 전환) -->
      <div id="board-wrapper">
        <!-- 체스 보드 영역 -->
        <div id="chess-board-area">
          <div id="rank-labels-left"></div>
          <div id="board-container">
            <div id="chessboard"></div>
            <!-- 프로모션 선택 오버레이 -->
            <div id="promotion-overlay" style="display:none;">
              <div id="promotion-choices"></div>
            </div>
          </div>
          <div id="file-labels-bottom"></div>
        </div>
        <!-- 오목 보드 영역 -->
        <div id="omok-board-area" style="display:none;">
          <div id="omokboard"></div>
        </div>
        <!-- 사목 보드 영역 -->
        <div id="connect4-board-area" style="display:none;">
          <div id="connect4board"></div>
        </div>
        <!-- 오셀로 보드 영역 -->
        <div id="othello-board-area" style="display:none;">
          <div id="othelloboard"></div>
        </div>
        <!-- 인디언 포커 영역 -->
        <div id="indianpoker-board-area" style="display:none;width:100%;">
        </div>
        <!-- 체커 보드 영역 -->
        <div id="checkers-board-area" style="display:none;">
          <div id="checkersboard"></div>
        </div>
        <!-- 사과게임 보드 영역 -->
        <div id="applegame-board-area" style="display:none;">
          <div id="applegameboard"></div>
        </div>
        <!-- 배틀십 보드 영역 -->
        <div id="battleship-board-area" style="display:none;">
          <div id="battleshipboard"></div>
        </div>
        <!-- 백가몬 보드 영역 -->
        <div id="backgammon-board-area" style="display:none;">
          <div id="backgammonboard"></div>
        </div>
        <!-- 텍사스 홀덤 보드 영역 -->
        <div id="texasholdem-board-area" style="display:none;">
          <div id="texasholdemboard"></div>
        </div>
        <!-- 도트앤박스 보드 영역 -->
        <div id="dotsboxes-board-area" style="display:none;">
          <div id="dotsboxesboard"></div>
        </div>
        <!-- 만칼라 보드 영역 -->
        <div id="mancala-board-area" style="display:none;">
          <div id="mancalaboard"></div>
        </div>
      </div>

      <!-- 상태 표시 -->
      <div id="turn-indicator" class="turn-indicator"></div>

      <!-- 내 정보 -->
      <div class="player-bar" id="my-bar">
        <div class="player-info">
          <span class="player-color-dot" id="my-dot"></span>
          <span class="player-label" id="my-label">나</span>
        </div>
        <div class="timer-display" id="my-timer">-</div>
      </div>

      <!-- 게임 컨트롤 -->
      <div id="game-controls">
        <button class="btn-control btn-info" id="rules-btn" title="게임 규칙 보기">📋 규칙</button>
        <button class="btn-control btn-danger" id="resign-btn">기권</button>
        <button class="btn-control btn-undo" id="undo-btn" style="display:none;" title="마지막 수 무르기">↩ 무르기</button>
        <button class="btn-control btn-neutral" id="draw-btn">무승부 제안</button>
        <button class="btn-control btn-leave" id="leave-btn">나가기</button>
        <button class="btn-control btn-chat" id="chat-toggle-btn">💬 채팅</button>
        <div id="sound-controls">
          <button id="sound-toggle-btn" class="btn-sound" title="사운드 켜기/끄기">🔊</button>
          <input type="range" id="volume-slider" min="0" max="100" value="70" title="볼륨 조절">
        </div>
      </div>

      <!-- 관전자 컨트롤 (관전 모드에서만 표시) -->
      <div id="spectator-controls" style="display:none;">
        <div id="spectator-hint-bar">
          <span id="spectator-hint-label">훈수 제안:</span>
          <span id="spectator-hint-status">기물을 클릭하여 수를 선택하세요</span>
          <button class="btn-control btn-hint" id="spectator-cancel-hint" style="display:none;">취소</button>
        </div>
        <span id="spectator-count-badge">👁 관전자 <span id="spectator-count">0</span>명</span>
      </div>
    </main>

    <!-- 오른쪽: 수 기록 + 복기 (데스크탑) -->
    <aside id="moves-panel">
      <div class="panel-header">수 기록</div>
      <div id="move-list"></div>

      <!-- 복기 툴바 (게임 종료 후) -->
      <div id="review-bar" style="display:none;">
        <button class="review-btn" id="review-first">⏮</button>
        <button class="review-btn" id="review-prev">◀</button>
        <span id="review-counter">0 / 0</span>
        <button class="review-btn" id="review-next">▶</button>
        <button class="review-btn" id="review-last">⏭</button>
        <button class="review-btn review-btn-newgame" id="review-newgame-btn" title="새 게임">🏠</button>
      </div>
    </aside>
  </div>

  <!-- 게임 종료 모달 -->
  <div id="gameover-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-icon" id="gameover-icon"></div>
      <h2 id="gameover-title"></h2>
      <p id="gameover-subtitle"></p>
      <div class="modal-buttons">
        <button class="btn-primary" id="rematch-btn">재대국</button>
        <button class="btn-secondary" onclick="location.href='/'">새 게임</button>
      </div>
      <p class="modal-hint">복기하려면 모달을 닫으세요</p>
      <button class="modal-close" id="modal-close-btn">✕</button>
    </div>
  </div>

  <!-- 무승부 제안 모달 -->
  <div id="draw-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>무승부 제안</h2>
      <p>상대방이 무승부를 제안했습니다.</p>
      <div class="modal-buttons">
        <button class="btn-primary" id="draw-accept-btn">수락</button>
        <button class="btn-secondary" id="draw-decline-btn">거절</button>
      </div>
    </div>
  </div>

  <!-- 무르기 요청 모달 (멀티플레이어 - 상대방에게 표시) -->
  <div id="undo-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>무르기 요청</h2>
      <p>상대방이 마지막 수를 취소하려 합니다.</p>
      <div class="modal-buttons">
        <button class="btn-primary" id="undo-accept-btn">수락</button>
        <button class="btn-secondary" id="undo-decline-btn">거절</button>
      </div>
    </div>
  </div>

  <!-- 자동 거절 설정 패널 (멀티플레이어 전용, 게임 중 표시) -->
  <div id="auto-decline-panel" style="display:none;">
    <label class="auto-decline-toggle" title="상대방의 무르기 요청을 자동으로 거절합니다">
      <input type="checkbox" id="auto-decline-undo">
      <span class="toggle-slider"></span>
      <span class="toggle-label">무르기 자동 거절</span>
    </label>
    <label class="auto-decline-toggle" title="상대방의 무승부 제안을 자동으로 거절합니다">
      <input type="checkbox" id="auto-decline-draw">
      <span class="toggle-slider"></span>
      <span class="toggle-label">무승부 자동 거절</span>
    </label>
  </div>

  <!-- 기권 확인 모달 -->
  <div id="resign-modal" class="modal" style="display:none;">
    <div class="modal-content">
      <h2>기권하시겠습니까?</h2>
      <p>기권하면 상대방이 승리합니다.</p>
      <div class="modal-buttons">
        <button class="btn-danger-solid" id="resign-confirm-btn">기권</button>
        <button class="btn-secondary" id="resign-cancel-btn">취소</button>
      </div>
    </div>
  </div>

  <!-- 규칙 모달 -->
  <div id="game-rules-modal" class="modal" style="display:none;" onclick="if(event.target===this)this.style.display='none'">
    <div class="modal-content" style="max-width:460px;max-height:75vh;overflow-y:auto;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h2 id="game-rules-title" style="margin:0;font-size:17px;"></h2>
        <button class="modal-close" id="game-rules-close-btn">✕</button>
      </div>
      <div id="game-rules-body"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.12.0/chess.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="js/sound.js?v=1.2"></script>
  <script src="js/timer.js?v=1.2"></script>
  <script src="js/chat.js?v=1.2"></script>
  <script src="js/board.js?v=1.2"></script>
  <script src="js/omok-board.js?v=1.2"></script>
  <script src="js/connect4-board.js?v=1.2"></script>
  <script src="js/othello-board.js?v=1.2"></script>
  <script src="js/indian-poker.js?v=1.2"></script>
  <script src="js/checkers-board.js?v=1.2"></script>
  <script src="js/stats.js?v=1.2"></script>
  <script src="js/ai-connect4.js?v=1.2"></script>
  <script src="js/ai-chess.js?v=1.2"></script>
  <script src="js/ai-omok.js?v=1.2"></script>
  <script src="js/ai-othello.js?v=1.2"></script>
  <script src="js/ai-indianpoker.js?v=1.3"></script>
  <script src="js/ai-checkers.js?v=1.2"></script>
  <script src="js/ai-applegame.js?v=1.0"></script>
  <script src="js/applegame-board.js?v=1.0"></script>
  <script src="js/ai-battleship.js?v=1.0"></script>
  <script src="js/battleship-board.js?v=1.0"></script>
  <script src="js/game-battleship.js?v=1.0"></script>
  <script src="js/ai-backgammon.js?v=1.0"></script>
  <script src="js/backgammon-board.js?v=1.0"></script>
  <script src="js/game-backgammon.js?v=1.0"></script>
  <script src="js/ai-texasholdem.js?v=1.0"></script>
  <script src="js/texas-holdem.js?v=1.0"></script>
  <script src="js/game-texasholdem.js?v=1.0"></script>
  <script src="js/ai-dotsboxes.js?v=1.0"></script>
  <script src="js/dotsboxes-board.js?v=1.0"></script>
  <script src="js/game-dotsboxes.js?v=1.0"></script>
  <script src="js/ai-mancala.js?v=1.0"></script>
  <script src="js/mancala-board.js?v=1.0"></script>
  <script src="js/game-mancala.js?v=1.0"></script>
  <script src="js/game-chess.js?v=1.2"></script>
  <script src="js/game-omok.js?v=1.3"></script>
  <script src="js/game-connect4.js?v=1.3"></script>
  <script src="js/game-othello.js?v=1.2"></script>
  <script src="js/game-checkers.js?v=1.2"></script>
  <script src="js/game-indianpoker.js?v=1.3"></script>
  <script src="js/game-applegame.js?v=1.0"></script>
  <script src="js/review.js?v=1.2"></script>
  <script src="js/game-registry.js?v=1.0"></script>
  <script src="js/game.js?v=1.3"></script>
  <script>
    // Sound controls init
    (function () {
      const toggleBtn   = document.getElementById('sound-toggle-btn');
      const slider      = document.getElementById('volume-slider');

      // Apply saved settings
      slider.value = Sound.volume;
      toggleBtn.textContent = Sound.muted ? '🔇' : '🔊';

      toggleBtn.addEventListener('click', () => {
        Sound.setMuted(!Sound.muted);
        toggleBtn.textContent = Sound.muted ? '🔇' : '🔊';
        // Resume AudioContext on first user interaction
        if (!Sound.muted) Sound.play('move');
      });

      slider.addEventListener('input', () => {
        Sound.setVolume(parseInt(slider.value));
        if (Sound.muted) { Sound.setMuted(false); toggleBtn.textContent = '🔊'; }
      });
    })();
  </script>
  <!-- Service Worker 등록 -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
