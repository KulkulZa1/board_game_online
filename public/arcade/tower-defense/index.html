<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tower Defense - Board Game Online</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/sandbox/tower-defense/graphics/sprites.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; background: #080810; color: #d0d8f0; font-family: "Segoe UI", system-ui, sans-serif; font-size: 13px; }
    #toolbar { display: flex; align-items: center; gap: 8px; height: 42px; padding: 6px 12px; background: #0d0d18; border-bottom: 1px solid #1e2030; }
    #toolbar a { color: #8a90a8; text-decoration: none; }
    #toolbar .title { font-weight: 700; }
    #toolbar .sep { flex: 1; }
    #toolbar button, .btn-small { background: rgba(255,255,255,0.06); border: 1px solid #1e2030; border-radius: 6px; color: #d0d8f0; padding: 4px 10px; cursor: pointer; }
    #toolbar button:hover, .btn-small:hover { background: rgba(255,255,255,0.1); }
    #main { display: flex; height: calc(100vh - 42px); }
    #game-canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #050508; overflow: hidden; }
    #game-canvas { display: block; max-width: 100%; max-height: 100%; cursor: crosshair; }
    #td-modal-overlay { display: none; position: absolute; inset: 0; z-index: 40; }
    #editor-panel { width: 320px; min-width: 320px; background: #0d0d18; border-left: 1px solid #1e2030; display: flex; flex-direction: column; overflow: hidden; }
    #tab-bar { display: flex; flex-wrap: wrap; gap: 2px; padding: 6px 6px 0; border-bottom: 1px solid #1e2030; background: #0a0a14; }
    .tab-btn { background: none; border: 1px solid transparent; border-radius: 6px 6px 0 0; color: #8a90a8; padding: 4px 8px; cursor: pointer; font-size: 0.72rem; }
    .tab-btn.active { background: #0d0d18; border-color: #1e2030; color: #d0d8f0; }
    #tab-content { flex: 1; overflow-y: auto; padding: 8px; }
    .tab-section h3 { font-size: 0.78rem; text-transform: uppercase; color: #8a90a8; margin: 10px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #1e2030; }
    .field-row { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .field-row label, .field-row > span:first-child { min-width: 90px; max-width: 90px; color: #8a90a8; font-size: 0.78rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .field-row input[type=range] { flex: 1; accent-color: #3498db; min-width: 0; }
    .field-row input[type=number], .field-row input[type=text], .field-row select { background: #11111e; border: 1px solid #1e2030; border-radius: 4px; color: #d0d8f0; padding: 2px 4px; font-size: 0.78rem; }
    .stage-block, .enemy-block, .passive-block { background: rgba(255,255,255,0.03); border: 1px solid #1e2030; border-radius: 8px; padding: 8px; margin-bottom: 6px; }
    .stage-header, .enemy-header, .passive-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .stage-name, .enemy-name, .passive-name { flex: 1; font-weight: 700; }
    #unsaved-dot { display: none; color: #f39c12; }
    #panel-toggle { display: none; }
    @media (max-width: 768px) {
      #main { flex-direction: column; }
      #game-canvas-wrap { height: calc(100vh - 42px - 48px); }
      #editor-panel { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; height: 60vh; transform: translateY(100%); transition: transform 0.3s ease; z-index: 30; border-left: none; border-top: 1px solid #1e2030; }
      #editor-panel.panel-open { transform: translateY(0); }
      #panel-toggle { display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 48px; align-items: center; justify-content: center; background: #0d0d18; border-top: 1px solid #1e2030; z-index: 25; font-weight: 700; }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <a class="back-link" href="/">Back</a>
    <span class="title">Tower Defense</span>
    <span id="unsaved-dot">*</span>
    <button data-action="place">Place Tower</button>
    <button data-action="start-wave">Start Wave</button>
    <span class="sep"></span>
    <a href="/sandbox/tower-defense/">Open Sandbox</a>
  </div>
  <div id="main">
    <div id="game-canvas-wrap">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      <div id="td-modal-overlay"></div>
    </div>
    <div id="editor-panel"></div>
  </div>
  <div id="panel-toggle">Editor Panel</div>

  <script src="/sandbox/tower-defense/graphics/theme.js?v=1.1"></script>
  <script src="/sandbox/tower-defense/config.js?v=1.1"></script>
  <script src="/js/sandbox-config.js?v=1.0"></script>
  <script>
    if (window.SandboxConfigBridge && window.TD_CONFIG) {
      window.SandboxConfigBridge.load('sandbox_td_config', window.TD_CONFIG);
    }
    document.getElementById('panel-toggle').addEventListener('click', function () {
      document.getElementById('editor-panel').classList.toggle('panel-open');
    });
  </script>
  <script src="/sandbox/tower-defense/game.js?v=1.2"></script>
  <script src="/sandbox/tower-defense/ui.js?v=1.2"></script>
  <script>
    TDGame.init(document.getElementById('game-canvas'));
    TDUI.init();
  </script>
</body>
</html>
