<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌱 Plant Growing Sandbox</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="graphics/sprites.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #080f08;
      --panel:    #0d160d;
      --border:   #1e2e1e;
      --accent:   #27ae60;
      --text:     #d5f0d5;
      --muted:    #6a8a6a;
      --panel-w:  320px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      height: 40px;
      position: relative;
      z-index: 10;
    }
    #toolbar a.back-link {
      color: var(--muted); text-decoration: none; font-size: 0.85rem; margin-right: 4px;
    }
    #toolbar a.back-link:hover { color: var(--text); }
    #toolbar .title { font-weight: 700; font-size: 0.95rem; }
    #unsaved-dot { display: none; color: #f39c12; margin: 0 2px; }
    #toolbar button {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 3px 10px;
      cursor: pointer;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    #toolbar button:hover { background: rgba(255,255,255,0.1); }

    /* ── Stage scrubber bar ──────────────────────────────────────── */
    #scrubber-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 12px;
      background: #0a130a;
      border-bottom: 1px solid var(--border);
      height: 32px;
    }
    #scrubber-bar label {
      font-size: 0.72rem;
      color: var(--muted);
      white-space: nowrap;
    }
    #stage-scrubber {
      flex: 1;
      accent-color: var(--accent);
      height: 12px;
    }
    #stage-label {
      min-width: 80px;
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
    }

    /* ── Main layout ─────────────────────────────────────────────── */
    #main {
      display: flex;
      height: calc(100vh - 72px);
    }

    /* ── Canvas wrap ─────────────────────────────────────────────── */
    #game-canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #060c06;
      overflow: hidden;
      position: relative;
    }
    #game-canvas {
      display: block;
      cursor: pointer;
    }

    /* ── Editor panel ────────────────────────────────────────────── */
    #editor-panel {
      width: var(--panel-w);
      min-width: var(--panel-w);
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #tab-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 6px 6px 0;
      border-bottom: 1px solid var(--border);
      background: #0a130a;
    }
    .tab-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px 6px 0 0;
      color: var(--muted);
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.72rem;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--panel);
      border-color: var(--border);
      border-bottom-color: var(--panel);
      color: var(--text);
    }

    #tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    #tab-content::-webkit-scrollbar { width: 5px; }
    #tab-content::-webkit-scrollbar-track { background: transparent; }
    #tab-content::-webkit-scrollbar-thumb { background: #1e2e1e; border-radius: 3px; }

    /* ── Panel components ────────────────────────────────────────── */
    .tab-section h3 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 10px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .tab-section h3:first-child { margin-top: 4px; }

    .field-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .field-row label, .field-row > span:first-child {
      min-width: 90px;
      max-width: 90px;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .field-row input[type=range] {
      flex: 1; accent-color: var(--accent); min-width: 0; height: 14px;
    }
    .field-row input[type=number], .field-row input[type=text] {
      width: 56px;
      background: #111a11;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 2px 4px;
      font-size: 0.78rem;
    }
    .field-row select {
      flex: 1;
      background: #111a11;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 2px 4px;
      font-size: 0.78rem;
    }
    .field-row input[type=checkbox] { accent-color: var(--accent); }
    .field-label {
      font-size: 0.72rem; color: var(--muted); margin: 6px 0 2px;
    }

    .btn-small {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 2px 8px;
      cursor: pointer;
      font-size: 0.72rem;
    }
    .btn-small:hover { background: rgba(255,255,255,0.1); }
    .btn-jump  { border-color: #27ae60; color: #27ae60; }
    .btn-disabled { opacity: 0.5; cursor: not-allowed; }

    /* Stage block */
    .stage-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
    }
    .stage-block.current-stage { border-color: var(--accent); }
    .stage-header {
      display: flex; align-items: center; gap: 6px; margin-bottom: 5px;
    }
    .stage-name { font-weight: 700; flex: 1; }

    /* Upgrade block */
    .upgrade-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px;
      margin-bottom: 5px;
    }
    .upgrade-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .upgrade-name { flex: 1; font-weight: 600; }
    .upgrade-count { font-size: 0.72rem; color: var(--accent); }
    .effect-preview { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .effect-tag {
      background: rgba(39,174,96,0.1);
      border: 1px solid #27ae6033;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.7rem;
      color: #7dcea0;
    }

    /* Node graph */
    .node-graph-wrap {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .graph-node {
      position: absolute;
      width: 28px; height: 28px;
      background: #111a11;
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.95rem;
      cursor: pointer;
      transform: translate(-50%, -50%);
    }
    .graph-node:hover { border-color: var(--accent); }
    .graph-node.node-bought { border-color: var(--accent); background: rgba(39,174,96,0.15); }

    /* Item block */
    .item-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px;
      margin-bottom: 5px;
    }
    .item-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .item-name { flex: 1; font-weight: 600; }

    /* Event block */
    .event-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px;
      margin-bottom: 5px;
    }
    .event-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .event-name { flex: 1; font-weight: 600; }
    .trigger-badge {
      font-size: 0.65rem;
      padding: 1px 5px;
      border-radius: 4px;
      border: 1px solid;
    }
    .trigger-random    { border-color: #e67e22; color: #e67e22; }
    .trigger-scheduled { border-color: #2980b9; color: #2980b9; }
    .trigger-condition { border-color: #8e44ad; color: #8e44ad; }
    .event-msg { background: #111a11; border: 1px solid var(--border); border-radius: 4px; color: var(--text); padding: 3px 6px; font-size: 0.78rem; }

    /* Visitor block */
    .visitor-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px;
      margin-bottom: 5px;
    }
    .visitor-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .visitor-name { font-weight: 600; flex: 1; }

    /* Season block */
    .season-day-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px;
      margin-bottom: 5px;
    }
    .season-day-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .season-day-name { font-weight: 600; flex: 1; }

    /* Mission block */
    .mission-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px;
      margin-bottom: 5px;
    }
    .mission-block.mission-done { border-color: var(--accent); opacity: 0.7; }
    .mission-name { font-weight: 600; margin-bottom: 3px; font-size: 0.85rem; }

    /* Curve inputs */
    .curve-inputs .field-row input { width: 50px; }

    /* Level inputs */
    .level-inputs { display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 4px; }
    .level-input { width: 52px; font-size: 0.78rem; }

    /* ── Mobile drawer ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #main { flex-direction: column; }
      #game-canvas-wrap { height: calc(100vh - 72px - 48px); }
      #editor-panel {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%; height: 60vh;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        z-index: 30;
        border-left: none;
        border-top: 1px solid var(--border);
      }
      #editor-panel.panel-open { transform: translateY(0); }
      #panel-toggle {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 48px;
        background: var(--panel);
        border-top: 1px solid var(--border);
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 25;
        color: var(--text);
        font-size: 0.9rem;
        font-weight: 700;
      }
    }
    @media (min-width: 769px) { #panel-toggle { display: none; } }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div id="toolbar">
    <a class="back-link" href="../">← Back</a>
    <span class="title">🌱 Plant Sandbox</span>
    <span id="unsaved-dot">●</span>
    <button data-action="export">📤</button>
    <button data-action="import">📥</button>
    <button data-action="snapshot">💾</button>
    <button data-action="snapshots">📂</button>
    <button data-action="reset">↺</button>
  </div>

  <!-- Stage scrubber -->
  <div id="scrubber-bar">
    <label>Stage:</label>
    <input type="range" id="stage-scrubber" min="0" max="8" value="0" step="1">
    <span id="stage-label">Seed</span>
  </div>

  <!-- Main layout -->
  <div id="main">
    <div id="game-canvas-wrap">
      <canvas id="game-canvas" width="600" height="600"></canvas>
    </div>
    <div id="editor-panel">
      <!-- built by PGUI.init() -->
    </div>
  </div>

  <div id="panel-toggle">☰ Editor Panel</div>

  <script src="graphics/theme.js"></script>
  <script src="config.js"></script>
  <script src="game.js"></script>
  <script src="ui.js"></script>

  <script>
    document.getElementById('panel-toggle').addEventListener('click', function () {
      document.getElementById('editor-panel').classList.toggle('panel-open');
    });

    // Stage scrubber wires to PGGame.jumpToStage
    var scrubber = document.getElementById('stage-scrubber');
    var stageLabel = document.getElementById('stage-label');
    scrubber.max = PG_CONFIG.GROWTH_STAGES.length - 1;
    scrubber.addEventListener('input', function () {
      var n = parseInt(scrubber.value);
      PGGame.jumpToStage(n);
      var s = PG_CONFIG.GROWTH_STAGES[n];
      if (stageLabel) stageLabel.textContent = s ? s.name : '';
    });

    PGGame.init(document.getElementById('game-canvas'));
    PGUI.init();
  </script>
</body>
</html>
