<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🏰 Tower Defense Sandbox</title>
  <link rel="icon" href="/icons/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="graphics/sprites.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #080810;
      --panel:   #0d0d18;
      --border:  #1e2030;
      --accent:  #3498db;
      --text:    #d0d8f0;
      --muted:   #606880;
      --panel-w: 320px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      overflow: hidden;
    }

    /* ── Toolbar ─────────────────────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      height: 40px;
      position: relative;
      z-index: 10;
    }
    #toolbar a.back-link {
      color: var(--muted); text-decoration: none; font-size: 0.85rem; margin-right: 4px;
    }
    #toolbar a.back-link:hover { color: var(--text); }
    #toolbar .title { font-weight: 700; font-size: 0.95rem; }
    #unsaved-dot { display: none; color: #f39c12; margin: 0 2px; }
    #toolbar button {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 3px 10px;
      cursor: pointer;
      font-size: 0.78rem;
      white-space: nowrap;
    }
    #toolbar button:hover { background: rgba(255,255,255,0.1); }
    #toolbar .sep { flex: 1; }

    /* ── Main layout ─────────────────────────────────────────────── */
    #main {
      display: flex;
      height: calc(100vh - 40px);
    }

    /* ── Canvas wrap ─────────────────────────────────────────────── */
    #game-canvas-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #050508;
      overflow: hidden;
      position: relative;
    }
    #game-canvas {
      display: block;
      cursor: crosshair;
      max-width: 100%;
      max-height: 100%;
    }
    #td-modal-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 40;
    }

    /* ── Editor panel ────────────────────────────────────────────── */
    #editor-panel {
      width: var(--panel-w);
      min-width: var(--panel-w);
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #tab-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 2px;
      padding: 6px 6px 0;
      border-bottom: 1px solid var(--border);
      background: #0a0a14;
    }
    .tab-btn {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px 6px 0 0;
      color: var(--muted);
      padding: 4px 8px;
      cursor: pointer;
      font-size: 0.72rem;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      background: var(--panel);
      border-color: var(--border);
      border-bottom-color: var(--panel);
      color: var(--text);
    }

    #tab-content {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    #tab-content::-webkit-scrollbar { width: 5px; }
    #tab-content::-webkit-scrollbar-track { background: transparent; }
    #tab-content::-webkit-scrollbar-thumb { background: #1e2030; border-radius: 3px; }

    /* ── Panel components ────────────────────────────────────────── */
    .tab-section h3 {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin: 10px 0 6px;
      padding-bottom: 4px;
      border-bottom: 1px solid var(--border);
    }
    .tab-section h3:first-child { margin-top: 4px; }

    .field-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 5px;
    }
    .field-row label, .field-row > span:first-child {
      min-width: 90px;
      max-width: 90px;
      color: var(--muted);
      font-size: 0.78rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .field-row input[type=range] {
      flex: 1; accent-color: var(--accent); min-width: 0; height: 14px;
    }
    .field-row input[type=number], .field-row input[type=text] {
      width: 56px;
      background: #11111e;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 2px 4px;
      font-size: 0.78rem;
    }
    .field-row select {
      flex: 1;
      background: #11111e;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text);
      padding: 2px 4px;
      font-size: 0.78rem;
    }
    .field-row input[type=checkbox] { accent-color: var(--accent); }

    .btn-small {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      padding: 2px 8px;
      cursor: pointer;
      font-size: 0.72rem;
    }
    .btn-small:hover { background: rgba(255,255,255,0.1); }
    .btn-jump  { border-color: var(--accent); color: var(--accent); }

    .stage-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      margin-bottom: 6px;
    }
    .stage-block.current-stage { border-color: var(--accent); }
    .stage-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .stage-name { font-weight: 700; flex: 1; }

    .item-block {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px;
      margin-bottom: 5px;
    }
    .item-header { display: flex; align-items: center; gap: 6px; margin-bottom: 5px; }
    .item-name { flex: 1; font-weight: 600; }

    .node-graph-wrap {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    /* ── Mobile drawer ────────────────────────────────────────────── */
    @media (max-width: 768px) {
      #main { flex-direction: column; }
      #game-canvas-wrap { height: calc(100vh - 40px - 48px); }
      #editor-panel {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        width: 100%; height: 60vh;
        transform: translateY(100%);
        transition: transform 0.3s ease;
        z-index: 30;
        border-left: none;
        border-top: 1px solid var(--border);
      }
      #editor-panel.panel-open { transform: translateY(0); }
      #panel-toggle {
        display: flex;
        position: fixed;
        bottom: 0; left: 0; right: 0;
        height: 48px;
        background: var(--panel);
        border-top: 1px solid var(--border);
        align-items: center;
        justify-content: center;
        cursor: pointer;
        z-index: 25;
        color: var(--text);
        font-size: 0.9rem;
        font-weight: 700;
      }
    }
    @media (min-width: 769px) { #panel-toggle { display: none; } }
  </style>
</head>
<body>
  <div id="toolbar">
    <a class="back-link" href="../">← Back</a>
    <span class="title">🏰 TD Sandbox</span>
    <span id="unsaved-dot">●</span>
    <button data-action="place">🏰 Place</button>
    <button data-action="start-wave">▶ Wave</button>
    <span class="sep"></span>
    <button data-action="export">📤</button>
    <button data-action="import">📥</button>
    <button data-action="snapshot">💾</button>
    <button data-action="snapshots">📂</button>
    <button data-action="reset">↺</button>
  </div>

  <div id="main">
    <div id="game-canvas-wrap">
      <canvas id="game-canvas" width="800" height="600"></canvas>
      <div id="td-modal-overlay"></div>
    </div>
    <div id="editor-panel">
      <!-- built by TDUI.init() -->
    </div>
  </div>

  <div id="panel-toggle">☰ Editor Panel</div>

  <script src="graphics/theme.js"></script>
  <script src="config.js"></script>
  <script src="game.js"></script>
  <script src="ui.js"></script>

  <script>
    document.getElementById('panel-toggle').addEventListener('click', function () {
      document.getElementById('editor-panel').classList.toggle('panel-open');
    });

    TDGame.init(document.getElementById('game-canvas'));
    TDUI.init();
  </script>
</body>
</html>
